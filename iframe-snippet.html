<!--
  ══════════════════════════════════════════════════════════════════
  ZekerbijOntslag — Lisa chatbot embed snippet
  ══════════════════════════════════════════════════════════════════

  Gebruik:
  ─────────────────────────────────────────────────────────────────
  1. Vervang https://jouw-vercel-url.vercel.app door je echte URL
     (of je eigen domein, bijv. https://chat.zekerbijontslag.nl)

  2. Plak dit snippet in:
     • Lovable:   voeg een HTML-blok toe en plak dit erin
     • WordPress: gebruik een "Custom HTML" blok in de editor,
                  of voeg het toe via Appearance > Theme Editor > page.php
     • Webflow:   voeg een Embed element toe en plak dit erin

  3. Pas de hoogte aan via style="height: 700px" als gewenst.
  ══════════════════════════════════════════════════════════════════
-->

<!-- Volledig scherm (eigen pagina) -->
<iframe
  src="https://jouw-vercel-url.vercel.app"
  style="width: 100%; height: 700px; border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);"
  title="Gratis intake — ZekerbijOntslag.nl"
  loading="lazy"
  allow="clipboard-write"
></iframe>


<!--
  ══════════════════════════════════════════════════════════════════
  Floating chat knop (optioneel)
  ══════════════════════════════════════════════════════════════════
  Toont een groene knop rechtsonder die de chatbot opent in een
  popup. Werkt op elke pagina van je site.
  ══════════════════════════════════════════════════════════════════
-->
<style>
  #zbo-chat-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    background: #2d7a4f;
    color: white;
    border: none;
    border-radius: 999px;
    padding: 14px 22px;
    font-size: 15px;
    font-family: system-ui, sans-serif;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(45,122,79,0.4);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  #zbo-chat-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(45,122,79,0.5);
  }
  #zbo-chat-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9998;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(2px);
  }
  #zbo-chat-overlay.open {
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    padding: 16px;
  }
  #zbo-chat-popup {
    width: 420px;
    height: 680px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    border: none;
    background: white;
  }
  @media (max-width: 480px) {
    #zbo-chat-popup { width: 100%; height: 90dvh; border-radius: 20px 20px 0 0; }
    #zbo-chat-overlay.open { padding: 0; align-items: flex-end; }
  }
</style>

<button id="zbo-chat-btn" onclick="document.getElementById('zbo-chat-overlay').classList.toggle('open')">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  Gratis advies
</button>

<div id="zbo-chat-overlay" onclick="if(event.target===this)this.classList.remove('open')">
  <iframe
    id="zbo-chat-popup"
    src="https://jouw-vercel-url.vercel.app"
    title="Gratis intake — ZekerbijOntslag.nl"
    allow="clipboard-write"
  ></iframe>
</div>
